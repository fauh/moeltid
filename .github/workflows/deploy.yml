name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore src/Moeltid/Moeltid.csproj

      - name: Restore test dependencies
        run: dotnet restore tests/Moeltid.Tests/Moeltid.Tests.csproj

      - name: Build (Release)
        run: dotnet build src/Moeltid/Moeltid.csproj -c Release --no-restore

      - name: Test (Release)
        run: dotnet test tests/Moeltid.Tests/Moeltid.Tests.csproj -c Release --no-build --verbosity normal

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Trigger Render deploy hook
        # RENDER_DEPLOY_HOOK is the full deploy-hook URL from the Render dashboard.
        # Set it as a GitHub Actions secret: repo Settings → Secrets → RENDER_DEPLOY_HOOK.
        # Never echo or log this value — it acts as a write credential.
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          if [ "$response" -ne 200 ] && [ "$response" -ne 201 ]; then
            echo "Render deploy hook returned HTTP $response"
            exit 1
          fi
          echo "Deploy triggered (HTTP $response)."
