name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore src/Moeltid/Moeltid.csproj

      - name: Restore test dependencies
        run: dotnet restore tests/Moeltid.Tests/Moeltid.Tests.csproj

      - name: Build (Release)
        run: dotnet build src/Moeltid/Moeltid.csproj -c Release --no-restore

      - name: Test (Release)
        run: dotnet test tests/Moeltid.Tests/Moeltid.Tests.csproj -c Release --no-build --verbosity normal

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        # FLY_API_TOKEN is a deploy-scoped token from `flyctl tokens create deploy`,
        # stored as a GitHub Actions secret. Never echo or log this value.
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
