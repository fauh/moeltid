# Render blueprint — https://render.com/docs/blueprint-spec
# Provision the web service and persistent disk in one go.
#
# One-time setup after first blueprint sync:
#   1. Set EmailSettings__ApiKey as an environment secret in the Render dashboard.
#   2. Set EmailSettings__BaseUrl to the assigned *.onrender.com URL.
#   3. Copy the Deploy Hook URL into the GitHub Actions secret RENDER_DEPLOY_HOOK.

services:
  - type: web
    name: consid-maltid
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt  # closest to Stockholm within Render's EU regions
    healthCheckPath: /health
    # Auto-deploy from Render is disabled — GitHub Actions drives deploys via hook.
    autoDeploy: false
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATA_DIR
        value: /data
      - key: EmailSettings__FromAddress
        value: onboarding@resend.dev
      - key: EmailSettings__UseRealProvider
        value: "true"
      # Set these in the Render dashboard (not committed to the repo):
      - key: EmailSettings__ApiKey
        sync: false
      - key: EmailSettings__BaseUrl
        sync: false
    disk:
      name: moeltid-data
      mountPath: /data
      sizeGB: 1
