# fly.toml app configuration file generated for moeltid on 2026-05-12T13:15:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'moeltid'
primary_region = 'arn'

[build]

[env]
  # Tells Program.cs to point SQLite at the mounted persistent volume.
  # Without this, the connection string falls back to a relative path
  # in /app (owned by root) which appuser can't write to — events
  # won't save. The mount destination must match the [mounts] block below.
  DATA_DIR = "/data"
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[mounts]
  source = "moeltid_data"
  destination = "/data"
