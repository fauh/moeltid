# fly.toml app configuration file generated for moeltid on 2026-05-12T13:25:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'moeltid'
primary_region = 'arn'

[http_service]
  auto_start_machines = true
  auto_stop_machines = true
  force_https = true
  internal_port = 8080
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'
  memory_mb = 256
